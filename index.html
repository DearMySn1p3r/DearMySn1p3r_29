<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Couple Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --c1:#C07088;
  --c2:#7090C0;
  --bg:#FAF0F2;
  --card:#FFFFFF;
  --border:#F0C8D4;
  --text:#2C2220;
  --sub:#B09898;
  --accent:#E8B4C0;
}
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg);
  min-height:100vh;
  padding:40px 20px 100px;
  transition:background .4s;
}

/* subtle dot pattern overlay */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:radial-gradient(circle, rgba(200,140,160,.12) 1px, transparent 1px);
  background-size:22px 22px;
  pointer-events:none;z-index:0;
}

/* toolbar */
.toolbar{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(255,255,255,.95);
  backdrop-filter:blur(14px);
  border-top:1px solid #F0DDE2;
  display:flex;align-items:center;justify-content:center;
  gap:6px;padding:11px 20px;z-index:200;
  flex-wrap:wrap;
}
.tb-group{display:flex;align-items:center;gap:6px}
.tb-sep{width:1px;height:20px;background:#ECD8DC;margin:0 8px}
.tb-label{font-size:10.5px;color:var(--sub);letter-spacing:.4px;white-space:nowrap}
.tb-btn{
  height:30px;padding:0 12px;
  border:1px solid #ECD8DC;border-radius:6px;
  background:#fff;
  font-family:'Noto Sans KR',sans-serif;
  font-size:11.5px;color:var(--text);
  cursor:pointer;transition:background .14s,border-color .14s;white-space:nowrap;
}
.tb-btn:hover{background:#FBF0F2;border-color:#E8C0C8}
.tb-btn.primary{
  background:linear-gradient(135deg,#D07888,#B068A0);
  color:#fff;border:none;
  box-shadow:0 2px 10px rgba(180,80,120,.2);
}
.tb-btn.primary:hover{opacity:.88}
.zoom-val{font-size:11.5px;color:var(--sub);min-width:38px;text-align:center}

/* bg swatches */
.bg-dot{
  width:18px;height:18px;border-radius:50%;
  cursor:pointer;border:2px solid transparent;
  transition:transform .15s,border-color .14s;
  flex-shrink:0;
}
.bg-dot:hover{transform:scale(1.18)}
.bg-dot.active{border-color:#888 !important}

/* layout */
.outer{max-width:820px;margin:0 auto;position:relative;z-index:1}
.scale-wrap{transform-origin:top center}

/* card */
#capture{
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 6px 36px rgba(180,100,130,.1), 0 1px 0 rgba(255,255,255,.8) inset;
}

/* decorative top strip */
.card-strip{
  height:5px;
  background:linear-gradient(90deg,#F0B0C0,#D090B0,#B0A0D0,#A0B8D8,#90C8C0);
}

/* header */
.hdr{padding:30px 44px 24px;border-bottom:1.5px solid #FAE8EC}

.cl-title{
  font-family:'Playfair Display',serif;
  font-size:22px;font-weight:400;font-style:italic;
  color:#C06080;letter-spacing:.5px;
  text-align:center;margin-bottom:28px;
}
.cl-title span{
  font-style:normal;font-size:13px;font-weight:400;
  font-family:'Noto Sans KR',sans-serif;
  color:var(--sub);letter-spacing:3px;
  display:block;text-transform:uppercase;margin-bottom:4px;
}

/* couple row */
.couple-row{display:flex;align-items:flex-start;justify-content:center;gap:0}
.person-wrap{
  display:flex;flex-direction:column;align-items:center;
  gap:11px;flex:1;max-width:260px;
}

.avatar{
  width:96px;height:96px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:30px;font-weight:500;color:#fff;
  overflow:hidden;position:relative;
  user-select:none;
}
#av1{box-shadow:0 0 0 2px #fff, 0 0 0 5px var(--c1), 0 6px 20px rgba(0,0,0,.12)}
#av2{box-shadow:0 0 0 2px #fff, 0 0 0 5px var(--c2), 0 6px 20px rgba(0,0,0,.12)}
.avatar-init{
  position:relative;z-index:1;pointer-events:none;
}
.avatar-img-wrap{
  position:absolute;inset:0;overflow:hidden;border-radius:50%;
  display:none;
}
.avatar-img-wrap img{
  position:absolute;
  transform-origin:center center;
  cursor:grab;
  will-change:transform;
  max-width:none;max-height:none;
  width:100%;height:100%;
  object-fit:cover;
}
.avatar-img-wrap img:active{cursor:grabbing}
.avatar-btn{
  position:absolute;bottom:0;left:0;right:0;
  height:26px;
  background:rgba(0,0,0,.34);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:3;
  font-size:10px;letter-spacing:.5px;color:rgba(255,255,255,.9);
  transition:background .15s;
}
.avatar-btn:hover{background:rgba(0,0,0,.46)}
.avatar-no-photo{cursor:pointer}
.photo-input{display:none}

.name-block{
  display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;
}
.name-in{
  border:none;border-bottom:1.5px solid #F0DCDE;
  padding:4px 0;width:130px;
  font-family:'Noto Sans KR',sans-serif;
  font-size:14px;font-weight:500;
  color:var(--text);text-align:center;
  outline:none;background:transparent;
  transition:border-color .2s;
}
.name-in:focus{border-color:var(--sub)}
.name-in::placeholder{color:#E0D0D2}

.color-row{display:flex;align-items:center;gap:6px}
.color-label{font-size:10px;color:var(--sub);letter-spacing:.3px}
.swatches{display:flex;gap:4px;align-items:center}
.swatch{
  width:14px;height:14px;border-radius:50%;
  cursor:pointer;border:2px solid transparent;
  transition:transform .14s,border-color .14s;flex-shrink:0;
}
.swatch:hover{transform:scale(1.2)}
.swatch.active{border-color:#666}
.custom-color{
  width:14px;height:14px;border-radius:50%;
  border:1.5px dashed #C8B0B4;
  overflow:hidden;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  position:relative;flex-shrink:0;
}
.custom-color input[type=color]{
  position:absolute;inset:0;opacity:0;cursor:pointer;width:200%;height:200%;
}
.custom-preview{width:8px;height:8px;border-radius:50%;pointer-events:none}

.x-divider{
  font-size:15px;font-weight:300;color:#D8C0C4;
  flex-shrink:0;margin:0 24px;padding-top:20px;
  font-family:'Playfair Display',serif;
}

/* legend */
.legend{
  display:flex;justify-content:center;gap:26px;
  margin-top:18px;padding-top:16px;
  border-top:1px dashed #F0DDE0;
}
.leg{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--sub)}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* body */
.body{padding:26px 40px 34px}

.cat{margin-bottom:24px}
.cat-hdr{
  display:flex;align-items:center;gap:12px;
  margin-bottom:12px;
}
.cat-label{
  font-size:10px;font-weight:500;
  letter-spacing:2px;
  text-transform:uppercase;white-space:nowrap;
  color:#C890A0;
}
.cat-line{
  flex:1;height:1px;
  background:linear-gradient(90deg,#F0C8D0,transparent);
}

.grid{display:grid;grid-template-columns:1fr 1fr;column-gap:4px;row-gap:0}

.item{
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 8px;border-radius:7px;
  transition:background .12s;
}
.item:hover{background:#FDF5F6}
.item-txt{
  font-size:12.5px;color:#3C2A2E;
  font-weight:300;flex:1;line-height:1.5;
}
.dots{display:flex;gap:5px;margin-left:8px;flex-shrink:0}
.dot{
  width:13px;height:13px;border-radius:50%;
  border:1.5px solid;cursor:pointer;
  transition:transform .12s,background .14s;flex-shrink:0;
}
.dot:hover{transform:scale(1.3)}
.dot.d1{border-color:var(--c1)}
.dot.d1.on{background:var(--c1)}
.dot.d2{border-color:var(--c2)}
.dot.d2.on{background:var(--c2)}

/* card footer */
.card-footer{
  padding:14px 40px;
  border-top:1px dashed #F0DDE0;
  display:flex;justify-content:center;
}
.footer-txt{font-size:10px;color:#D8C0C4;letter-spacing:1.5px;text-transform:uppercase}
</style>
</head>
<body>

<div class="outer">
  <div class="scale-wrap" id="scaleWrap">
    <div id="capture">
      <div class="card-strip"></div>

      <div class="hdr">
        <div class="cl-title">
          <span>our</span>
          Couple Checklist
        </div>

        <div class="couple-row">

          <div class="person-wrap">
            <div class="avatar" id="av1" style="background:var(--c1)">
              <label for="ph1" id="init1" style="cursor:pointer;display:flex;align-items:center;justify-content:center;position:absolute;inset:0;z-index:2;font-size:30px;font-weight:500;color:#fff">?</label>
              <div class="avatar-img-wrap" id="iw1">
                <img id="pi1" draggable="false">
              </div>
              <label for="ph1" class="avatar-btn" id="ab1" style="display:none">사진 변경</label>
            </div>
            <input type="file" accept="image/*" id="ph1" class="photo-input" onchange="loadPhoto(1)">
            <div class="name-block">
              <input class="name-in" id="n1" placeholder="이름 입력" maxlength="12" oninput="syncPerson(1)">
              <div class="color-row">
                <span class="color-label">컬러</span>
                <div class="swatches" id="sw1"></div>
                <div class="custom-color" title="직접 선택">
                  <div class="custom-preview" id="cp1"></div>
                  <input type="color" id="cc1" value="#C07088" oninput="setCustom(1,this.value)">
                </div>
              </div>
            </div>
          </div>

          <div class="x-divider">×</div>

          <div class="person-wrap">
            <div class="avatar" id="av2" style="background:var(--c2)">
              <label for="ph2" id="init2" style="cursor:pointer;display:flex;align-items:center;justify-content:center;position:absolute;inset:0;z-index:2;font-size:30px;font-weight:500;color:#fff">?</label>
              <div class="avatar-img-wrap" id="iw2">
                <img id="pi2" draggable="false">
              </div>
              <label for="ph2" class="avatar-btn" id="ab2" style="display:none">사진 변경</label>
            </div>
            <input type="file" accept="image/*" id="ph2" class="photo-input" onchange="loadPhoto(2)">
            <div class="name-block">
              <input class="name-in" id="n2" placeholder="이름 입력" maxlength="12" oninput="syncPerson(2)">
              <div class="color-row">
                <span class="color-label">컬러</span>
                <div class="swatches" id="sw2"></div>
                <div class="custom-color" title="직접 선택">
                  <div class="custom-preview" id="cp2"></div>
                  <input type="color" id="cc2" value="#7090C0" oninput="setCustom(2,this.value)">
                </div>
              </div>
            </div>
          </div>

        </div>

        <div class="legend">
          <div class="leg">
            <div class="leg-dot" id="ld1" style="background:var(--c1)"></div>
            <span id="lg1">Person 1</span>
          </div>
          <div class="leg">
            <div class="leg-dot" id="ld2" style="background:var(--c2)"></div>
            <span id="lg2">Person 2</span>
          </div>
        </div>
      </div>

      <div class="body" id="body"></div>

      <div class="card-footer">
        <span class="footer-txt">check together</span>
      </div>
    </div>
  </div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <div class="tb-group">
    <span class="tb-label">배경</span>
    <div id="bgSwatches" style="display:flex;gap:5px;align-items:center"></div>
  </div>
  <div class="tb-sep"></div>
  <div class="tb-group">
    <span class="tb-label">크기</span>
    <button class="tb-btn" onclick="dz(-0.1)">−</button>
    <span class="zoom-val" id="zv">100%</span>
    <button class="tb-btn" onclick="dz(0.1)">+</button>
    <button class="tb-btn" onclick="rz()">초기화</button>
  </div>
  <div class="tb-sep"></div>
  <button class="tb-btn primary" onclick="saveImg()">이미지 저장</button>
</div>

<script>
const DATA=[
  {
    title:'성격 & 성향',
    items:[
      '계획을 꼼꼼히 세우는 사람','즉흥적으로 결정하는 사람',
      '감정을 직접 말로 표현하는 사람','속마음을 잘 숨기는 사람',
      '고집이 센 사람','완벽주의 성향인 사람',
      '걱정이 많은 사람','긍정적으로 생각하려는 사람',
      '눈물이 많은 사람','웃음이 많은 사람',
    ]
  },
  {
    title:'연애 스타일',
    items:[
      '먼저 연락하는 사람','답장이 빠른 사람',
      '애교가 많은 사람','스킨십을 먼저 하는 사람',
      '기념일을 챙기는 사람','질투를 표현하는 사람',
      '사랑한다는 말을 자주 하는 사람',
    ]
  },
  {
    title:'생활 & 취향',
    items:[
      '맛집 탐방을 좋아하는 사람','요리를 해주는 사람',
      '여행 계획을 세우는 사람','아침에 일찍 일어나는 사람',
      '늦게 자는 사람','간식을 달고 사는 사람',
      '운전을 하는 사람','술을 잘 마시는 사람',
    ]
  },
];

const PALETTES={
  1:['#C07088','#C08A5A','#9870A8','#7888B8','#70A890'],
  2:['#7090C0','#60A8A0','#8880B8','#A87878','#88A060'],
};

const BG_PRESETS=[
  {color:'#FAF0F2',border:'#F0C8D4',label:'rose'},
  {color:'#FAF6F0',border:'#E8D8C4',label:'cream'},
  {color:'#F0EEF8',border:'#D4CCE8',label:'lavender'},
  {color:'#EFF5F0',border:'#C4DCC8',label:'sage'},
  {color:'#F2F2F0',border:'#DCDAD4',label:'stone'},
];

let zoom=1;

function setColor(n,hex){
  document.documentElement.style.setProperty('--c'+n,hex);
  document.getElementById('av'+n).style.background=hex;
  const ld=document.getElementById('ld'+n);
  if(ld)ld.style.background=hex;
  updateStrip();
}

function updateStrip(){
  const c1=getComputedStyle(document.documentElement).getPropertyValue('--c1').trim();
  const c2=getComputedStyle(document.documentElement).getPropertyValue('--c2').trim();
  document.querySelector('.card-strip').style.background=
    `linear-gradient(90deg,${c1},${blend(c1,c2)},${c2})`;
}

function blend(a,b){
  const p=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
  const [r1,g1,b1]=p(a.length===7?a:a);
  const [r2,g2,b2]=p(b.length===7?b:b);
  const r=Math.round((r1+r2)/2).toString(16).padStart(2,'0');
  const g=Math.round((g1+g2)/2).toString(16).padStart(2,'0');
  const bx=Math.round((b1+b2)/2).toString(16).padStart(2,'0');
  return '#'+r+g+bx;
}

function buildSwatches(){
  [1,2].forEach(n=>{
    const wrap=document.getElementById('sw'+n);
    PALETTES[n].forEach((hex,i)=>{
      const s=document.createElement('div');
      s.className='swatch'+(i===0?' active':'');
      s.style.background=hex;
      s.onclick=()=>{
        wrap.querySelectorAll('.swatch').forEach(x=>x.classList.remove('active'));
        s.classList.add('active');
        setColor(n,hex);
        document.getElementById('cc'+n).value=hex;
        document.getElementById('cp'+n).style.background=hex;
      };
      wrap.appendChild(s);
    });
    document.getElementById('cp'+n).style.background=PALETTES[n][0];
  });
}

function setCustom(n,hex){
  document.getElementById('cp'+n).style.background=hex;
  document.getElementById('sw'+n).querySelectorAll('.swatch').forEach(x=>x.classList.remove('active'));
  setColor(n,hex);
}

function buildBgSwatches(){
  const wrap=document.getElementById('bgSwatches');
  BG_PRESETS.forEach((p,i)=>{
    const s=document.createElement('div');
    s.className='bg-dot'+(i===0?' active':'');
    s.style.background=p.color;
    s.style.borderColor=p.border;
    s.title=p.label;
    s.onclick=()=>{
      wrap.querySelectorAll('.bg-dot').forEach(x=>x.classList.remove('active'));
      s.classList.add('active');
      document.body.style.background=p.color;
      document.documentElement.style.setProperty('--bg',p.color);
      document.documentElement.style.setProperty('--border',p.border);
      document.getElementById('capture').style.borderColor=p.border;
    };
    wrap.appendChild(s);
  });
}

function syncPerson(n){
  const v=document.getElementById('n'+n).value.trim();
  const lbl=document.getElementById('init'+n);
  lbl.textContent=v?v.charAt(0):'?';
  document.getElementById('lg'+n).textContent=v||'Person '+n;
}

/* per-avatar pan/zoom state */
const imgState={
  1:{scale:1,tx:0,ty:0,dragging:false,lx:0,ly:0,pinching:false,pd:0},
  2:{scale:1,tx:0,ty:0,dragging:false,lx:0,ly:0,pinching:false,pd:0},
};

function applyImgTransform(n){
  const s=imgState[n];
  const img=document.getElementById('pi'+n);
  img.style.transform=`translate(${s.tx}px,${s.ty}px) scale(${s.scale})`;
}

function setupImgInteraction(n){
  const wrap=document.getElementById('iw'+n);
  const img=document.getElementById('pi'+n);
  const s=imgState[n];

  /* wheel zoom */
  wrap.addEventListener('wheel',e=>{
    e.preventDefault();
    s.scale=Math.min(5,Math.max(.5,s.scale-(e.deltaY>0?-.15:.15)));
    applyImgTransform(n);
  },{passive:false});

  /* mouse drag */
  wrap.addEventListener('mousedown',e=>{
    e.preventDefault();
    s.dragging=true;s.lx=e.clientX;s.ly=e.clientY;
  });
  window.addEventListener('mousemove',e=>{
    if(!s.dragging)return;
    s.tx+=e.clientX-s.lx;s.ty+=e.clientY-s.ly;
    s.lx=e.clientX;s.ly=e.clientY;
    applyImgTransform(n);
  });
  window.addEventListener('mouseup',()=>{s.dragging=false});

  /* touch drag & pinch */
  wrap.addEventListener('touchstart',e=>{
    if(e.touches.length===1){
      s.dragging=true;
      s.lx=e.touches[0].clientX;s.ly=e.touches[0].clientY;
    } else if(e.touches.length===2){
      s.pinching=true;s.dragging=false;
      s.pd=Math.hypot(
        e.touches[0].clientX-e.touches[1].clientX,
        e.touches[0].clientY-e.touches[1].clientY
      );
    }
    e.preventDefault();
  },{passive:false});

  wrap.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(e.touches.length===1&&s.dragging){
      s.tx+=e.touches[0].clientX-s.lx;
      s.ty+=e.touches[0].clientY-s.ly;
      s.lx=e.touches[0].clientX;s.ly=e.touches[0].clientY;
      applyImgTransform(n);
    } else if(e.touches.length===2&&s.pinching){
      const nd=Math.hypot(
        e.touches[0].clientX-e.touches[1].clientX,
        e.touches[0].clientY-e.touches[1].clientY
      );
      s.scale=Math.min(5,Math.max(.5,s.scale*(nd/s.pd)));
      s.pd=nd;
      applyImgTransform(n);
    }
  },{passive:false});

  wrap.addEventListener('touchend',e=>{
    if(e.touches.length<2)s.pinching=false;
    if(e.touches.length===0)s.dragging=false;
  });
}

function loadPhoto(n){
  const f=document.getElementById('ph'+n).files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    const iw=document.getElementById('iw'+n);
    const img=document.getElementById('pi'+n);
    const init=document.getElementById('init'+n);
    const ab=document.getElementById('ab'+n);
    /* reset transform */
    imgState[n]={scale:1,tx:0,ty:0,dragging:false,lx:0,ly:0,pinching:false,pd:0};
    img.style.transform='';
    img.src=e.target.result;
    iw.style.display='block';
    init.style.visibility='hidden';
    ab.style.display='flex';
    setupImgInteraction(n);
  };
  r.readAsDataURL(f);
}

function render(){
  const body=document.getElementById('body');
  body.innerHTML='';
  DATA.forEach(cat=>{
    const cd=document.createElement('div');cd.className='cat';
    const hdr=document.createElement('div');hdr.className='cat-hdr';
    const lbl=document.createElement('span');lbl.className='cat-label';lbl.textContent=cat.title;
    const line=document.createElement('div');line.className='cat-line';
    hdr.appendChild(lbl);hdr.appendChild(line);cd.appendChild(hdr);
    const g=document.createElement('div');g.className='grid';
    cat.items.forEach(txt=>{
      const row=document.createElement('div');row.className='item';
      const sp=document.createElement('span');sp.className='item-txt';sp.textContent=txt;
      const ds=document.createElement('div');ds.className='dots';
      [1,2].forEach(p=>{
        const d=document.createElement('div');
        d.className='dot d'+p;
        d.onclick=()=>d.classList.toggle('on');
        ds.appendChild(d);
      });
      row.appendChild(sp);row.appendChild(ds);g.appendChild(row);
    });
    cd.appendChild(g);body.appendChild(cd);
  });
}

function applyZoom(){
  const sw=document.getElementById('scaleWrap');
  const cap=document.getElementById('capture');
  sw.style.transform=`scale(${zoom})`;
  sw.style.transformOrigin='top center';
  sw.style.height=(cap.offsetHeight*zoom)+'px';
  document.getElementById('zv').textContent=Math.round(zoom*100)+'%';
}
function dz(d){zoom=Math.min(1.6,Math.max(0.4,+(zoom+d).toFixed(1)));applyZoom();}
function rz(){zoom=1;applyZoom();}

function getAvatarDataURL(n){
  const iw=document.getElementById('iw'+n);
  const img=document.getElementById('pi'+n);
  const s=imgState[n];
  if(!img.src||!img.naturalWidth||iw.style.display!=='block')return null;
  const SIZE=96,R=6,W=SIZE*R,H=SIZE*R;
  const c=document.createElement('canvas');c.width=W;c.height=H;
  const ctx=c.getContext('2d');
  ctx.beginPath();ctx.arc(W/2,H/2,W/2,0,Math.PI*2);ctx.clip();
  const nw=img.naturalWidth,nh=img.naturalHeight;
  const cs=Math.max(SIZE/nw,SIZE/nh);
  const dw=nw*cs*R,dh=nh*cs*R;
  ctx.save();
  ctx.translate(W/2+s.tx*R,H/2+s.ty*R);
  ctx.scale(s.scale,s.scale);
  ctx.drawImage(img,-dw/2,-dh/2,dw,dh);
  ctx.restore();
  return c.toDataURL('image/png');
}

async function saveImg(){
  if(typeof html2canvas==='undefined'){
    alert('라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.');return;
  }

  const btn=document.querySelector('.tb-btn.primary');
  btn.textContent='저장 중...';btn.disabled=true;

  await document.fonts.ready;
  await new Promise(r=>requestAnimationFrame(r));
  await new Promise(r=>setTimeout(r,100));

  const sw=document.getElementById('scaleWrap');
  const prev=sw.style.transform;const prevH=sw.style.height;
  sw.style.transform='none';sw.style.height='auto';

  const cap=document.getElementById('capture');
  const cs=getComputedStyle(document.documentElement);
  const c1=cs.getPropertyValue('--c1').trim();
  const c2=cs.getPropertyValue('--c2').trim();

  /* fix capture width to 820px so grid doesn't collapse */
  const prevWidth=cap.style.width;
  const prevMinWidth=cap.style.minWidth;
  cap.style.width='820px';
  cap.style.minWidth='820px';

  /* inline CSS-var-dependent styles for html2canvas */
  const d1s=cap.querySelectorAll('.dot.d1');
  const d2s=cap.querySelectorAll('.dot.d2');
  d1s.forEach(d=>{d.style.borderColor=c1;if(d.classList.contains('on'))d.style.background=c1;});
  d2s.forEach(d=>{d.style.borderColor=c2;if(d.classList.contains('on'))d.style.background=c2;});

  await new Promise(r=>requestAnimationFrame(r));
  await new Promise(r=>setTimeout(r,80));

  try{
    const av1url=getAvatarDataURL(1);
    const av2url=getAvatarDataURL(2);

    const canvas=await html2canvas(cap,{
      scale:3,useCORS:true,allowTaint:true,
      backgroundColor:'#ffffff',logging:false,
      windowWidth:900,
      ignoreElements:el=>el.classList&&el.classList.contains('toolbar'),
      onclone:(clonedDoc)=>{
        /* hide color picker rows and legend in saved image */
        clonedDoc.querySelectorAll('.color-row, .legend, .avatar-btn').forEach(el=>{
          el.style.display='none';
        });
        /* inline avatar ring with resolved hex colors so html2canvas renders them */
        const cAv1=clonedDoc.getElementById('av1');
        const cAv2=clonedDoc.getElementById('av2');
        if(cAv1)cAv1.style.boxShadow='0 0 0 2px #fff, 0 0 0 5px '+c1+', 0 6px 20px rgba(0,0,0,.12)';
        if(cAv2)cAv2.style.boxShadow='0 0 0 2px #fff, 0 0 0 5px '+c2+', 0 6px 20px rgba(0,0,0,.12)';
        /* safety: remove any img without src (causes html2canvas 0-size error) */
        clonedDoc.querySelectorAll('img').forEach(img=>{
          if(!img.src||img.src===''||img.src===window.location.href){
            img.remove();
          }
        });
        [1,2].forEach((n,i)=>{
          const url=[av1url,av2url][i];
          const ciw=clonedDoc.getElementById('iw'+n);if(!ciw)return;
          let cimg=ciw.querySelector('img');
          if(!url){
            /* no photo for this person - remove the wrap */
            if(cimg)cimg.remove();
            return;
          }
          if(!cimg){
            cimg=clonedDoc.createElement('img');
            ciw.appendChild(cimg);
          }
          cimg.src=url;
          cimg.style.transform='none';
          cimg.style.width='96px';cimg.style.height='96px';
          cimg.style.objectFit='cover';
          cimg.style.position='absolute';cimg.style.inset='0';
          cimg.style.left='0';cimg.style.top='0';
        });
      },
    });
    const n1=document.getElementById('n1').value||'person1';
    const n2=document.getElementById('n2').value||'person2';
    const a=document.createElement('a');
    a.download='couple-checklist-'+n1+'x'+n2+'.png';
    a.href=canvas.toDataURL('image/png');
    document.body.appendChild(a);a.click();document.body.removeChild(a);
  }catch(e){
    alert('저장 실패: '+e.message);
  }finally{
    /* restore */
    d1s.forEach(d=>{d.style.borderColor='';d.style.background='';});
    d2s.forEach(d=>{d.style.borderColor='';d.style.background='';});
    cap.style.width=prevWidth;
    cap.style.minWidth=prevMinWidth;
    sw.style.transform=prev;sw.style.height=prevH;
    btn.textContent='이미지 저장';btn.disabled=false;
  }
}

buildSwatches();buildBgSwatches();render();
</script>
